<main>    
  <div class="d-flex flex-column flex-shrink-0 bg-light shaderight" style="width: 4.5rem;">
  <ul class="nav nav-pills nav-flush flex-column mb-auto text-center">
    <li class="nav-item">
      <a href="/" class="nav-link py-3 border-bottom" aria-current="page" title="Home" data-bs-toggle="tooltip" data-bs-placement="right">
        <svg class="bi" width="24" height="24" role="img" aria-label="Home"><use xlink:href="#home"/></svg>
      </a>
    </li>
    <li>
        <a href="/connection" class="nav-link py-3 border-bottom" title="Connection" data-bs-toggle="tooltip" data-bs-placement="right">
          <svg class="bi" width="24" height="24" role="img" aria-label="Connection"><use xlink:href="#wifi"/></svg>
        </a>
      </li>
    <li>
      <a href="/settings" class="nav-link active py-3 border-bottom" title="Settings" data-bs-toggle="tooltip" data-bs-placement="right">
        <svg class="bi" width="24" height="24" role="img" aria-label="Settings"><use xlink:href="#gear-fill"/></svg>
      </a>
    </li>
    <li>
      <a href="/hydrometers" class="nav-link py-3 border-bottom" title="Tiltlist" data-bs-toggle="tooltip" data-bs-placement="right">
        <svg class="bi" width="24" height="24" role="img" aria-label="Tiltlist"><use xlink:href="#card-list"/></svg>
      </a>
    </li>  
    <li>
      <a href="#" class="nav-link py-3 border-bottom" title="Reboot" data-bs-toggle="tooltip" data-bs-placement="right" id="doreboot">
        <svg class="bi" width="24" height="24" role="img" aria-label="Resets"><use xlink:href="#reset"/></svg>
      </a>
    </li>  
  </ul>
</div>
  <div class="content">
    <div class="page-header">
       <h1>Settings</h1>
    </div>
    <div class="container">   
      <div class="row">
        <div class="col">
          <form id="settingsForm">
          
              <!-- Data Source -->
          
              <div class="mb-4">
          
                  <label class="form-label">
                      Default Fermentation Unit
                  </label>
          
                  <div class="form-check">
                      <input
                          class="form-check-input"
                          type="radio"
                          name="fermunit"
                          id="unitSG"
                          value="0">
          
                      <label
                          class="form-check-label"
                          for="unitSG">
          
                         SG
          
                      </label>
                  </div>
          
                  <div class="form-check">
                      <input
                          class="form-check-input"
                          type="radio"
                          name="fermunit"
                          id="unitPlato"
                          value="1">
          
                      <label
                          class="form-check-label"
                          for="unitPlato">
          
                          Plato
          
                      </label>
                  </div>
          
              </div>
              <div class="mb-4">
              
                  <label class="form-label">
                      Default Temperature Unit
                  </label>
              
                  <div class="form-check">
                      <input
                          class="form-check-input"
                          type="radio"
                          name="tempunit"
                          id="unitF"
                          value="0">
              
                      <label
                          class="form-check-label"
                          for="unitF">
              
                         Fahrenheit
              
                      </label>
                  </div>
              
                  <div class="form-check">
                      <input
                          class="form-check-input"
                          type="radio"
                          name="tempunit"
                          id="unitC"
                          value="1">
              
                      <label
                          class="form-check-label"
                          for="unitC">
              
                          Celsius
              
                      </label>
                  </div>
              
              </div>      
              <div class="mb-4">
              
              <label class="form-label">
                  Display Timeout in seconds (Default 3 sec - 0 = always on)
              </label>
              <input type="text" name="timeout" id="distimeout" value="" class="form-control" />
              </div>
              <div class="mb-4">
              
              <label class="form-label">
                  Display orientation
              </label>
              <select name="orientation" id="orientation" class="form-select form-control">
                <option value="3" id="orientation3">Buttons left</option>
                <option value="1" id="orientation1">Buttons right</option>
              </select>
              <small>Note: Changing the orientation requires a reboot</small>
              </div>
              <button
                  type="submit"
                  class="btn btn-primary" id="saveconnconfig">
          
                  Save
          
              </button>
          
          </form>
          <br/>
         <div
             id="success"
             class="alert alert-success d-none mt-3"
             role="alert">
         
             Settings saved successfully.
         
         </div>
        </div>
      </div>
      <div class="row">
        <div class="col">
          <br/><br/>
          <form id="resetForm">
          <h2>Advanced</h2> 
              <!-- Data Source -->
              <div class="mb-4">
              <button
                  type="submit"
                  class="btn btn-primary" id="resettilts" style="float:left; margin-right:1em; margin-bottom:2em;">
          
                  Clear Hydrometer data
          
              </button>
              <button
                  type="submit"
                  class="btn btn-primary" id="factoryreset">
              
                  Factory reset and reboot 
              
              </button>
              
              </div>
          </form>
          <br/>
         <div
             id="clearsuccess"
             class="alert alert-success d-none mt-3"
             role="alert">
         
             Hydrometer data cleared
         
         </div>
        </div>
      </div>
    </div>
  </div>
</main>
<script src="/js/settings.js"></script>

</body>
</html>
